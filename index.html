<!DOCTYPE html>
<html lang="id">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6474607591538288" crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agent Intelligence Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
        }

        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 350px;
        }

        h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
            transition: border 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        .btn { 
            width: 100%;
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none;
            border-radius: 8px; 
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }

        #loadingMsg { 
            display: none; 
            margin-top: 15px; 
            font-size: 0.8rem; 
            color: var(--primary); 
            font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome Back</h1>
        <p>Please enter your credentials to access the Dashboard Agent Retention.</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button id="loginBtn" onclick="handleLogin()" class="btn">Login to Dashboard</button>
        
        <div id="loadingMsg">Verifying credentials...</div>
    </div>

    <script>
        async function handleLogin() {
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loadingMsg');

            if (!userInp || !passInp) {
                alert("Harap isi username dan password!");
                return;
            }

            // UI Feedback
            btn.disabled = true;
            loader.style.display = "block";

            try {
                const url = "https://raw.githubusercontent.com/AlvyFahmy/Agent_Retention/main/login.xlsx";
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("Gagal mengambil data login.");

                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const wb = XLSX.read(data, { type: 'array' });
                const loginData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

                // Validasi data dari Excel (Pastikan kolom di Excel adalah 'user' dan 'pass')
                const user = loginData.find(u => 
                    String(u.user).trim() === userInp.trim() && 
                    String(u.pass).trim() === passInp.trim()
                );

                if (user) {
                    // Simpan session
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', user.name);
                    
                    // Arahkan ke file dashboard (pastikan path benar)
                    window.location.href = "Agent_Retention/Dashboard_Agent_Retention.html";
                } else {
                    alert("Username atau Password Salah!");
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi ke database.");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }

        // Jalankan login dengan menekan tombol Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
